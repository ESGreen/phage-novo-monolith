{% extends "base.html" %}
{% load static %}

{% block header %}
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-title" href="/dashboard/">
        <img class="site-title__icon" src="{% static 'img/header_icon.png' %}" alt="" aria-hidden="true">
        <span>The Phage</span>
      </a>
      <nav class="member-nav" aria-label="Member navigation">
        {% for item in root_menu_items %}
          <a class="nav-link" href="{{ item.url }}">{{ item.label }}</a>
        {% empty %}
          <a class="nav-link" href="/dashboard/">Dashboard</a>
          <a class="nav-link" href="{% url 'camp:phagebook-current' %}">Phage Book</a>
          <a class="nav-link" href="{% url 'accounts:profile' %}">Profile</a>
        {% endfor %}
        {% if request.user.is_admin %}
          <a class="nav-link" href="{% url 'adminui:home' %}">Admin</a>
        {% endif %}
        <form class="logout-form" method="post" action="{% url 'accounts:logout' %}">
          {% csrf_token %}
          <button class="nav-link-button" type="submit">Logout</button>
        </form>
      </nav>
    </div>
  </header>
{% endblock %}
